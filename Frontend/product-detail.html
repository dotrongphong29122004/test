<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi Tiết Sản Phẩm | NoiThat.vn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
  <div id="header-placeholder"></div>

  <div class="min-h-screen bg-gray-50 py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <button onclick="window.history.back()" class="flex items-center gap-2 text-gray-600 hover:text-gray-900 mb-6 transition-colors">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
        Quay lại
      </button>

      <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div class="grid md:grid-cols-2 gap-8 p-8">
          <div class="space-y-4">
            <div class="relative rounded-xl overflow-hidden bg-gray-100">
              <img id="mainImage" src="" alt="Product" class="w-full h-96 object-cover">
              <button class="absolute top-4 right-4 p-3 bg-white rounded-full shadow-md hover:bg-red-50 transition-colors">
                <i data-lucide="heart" class="w-5 h-5 text-gray-600"></i>
              </button>
            </div>
            
            <div class="grid grid-cols-4 gap-2" id="thumbContainer">
            </div>
          </div>

          <div class="space-y-6">
            <div>
              <p id="productCategory" class="text-sm text-gray-500 mb-2"></p>
              <h1 id="productName" class="text-3xl font-bold text-gray-900 mb-3"></h1>
              
              <div class="flex items-center gap-2 mb-4">
                <div class="flex items-center" id="starContainer">
                </div>
                <span id="reviewCount" class="text-sm text-gray-600"></span>
              </div>
              
              <div class="flex items-center gap-3 mb-6">
                <span id="productPrice" class="text-3xl font-bold text-amber-600"></span>
                <span id="productOldPrice" class="text-xl text-gray-400 line-through hidden"></span>
                <span id="productDiscount" class="px-2 py-1 bg-red-100 text-red-600 text-sm font-semibold rounded hidden"></span>
              </div>
            </div>

            <div>
              <h3 class="font-semibold text-gray-900 mb-2">Mô tả sản phẩm</h3>
              <p id="productDescription" class="text-gray-600 leading-relaxed"></p>
            </div>

            <div>
              <h3 class="font-semibold text-gray-900 mb-3">Màu sắc</h3>
              <div class="flex gap-2" id="colorContainer">
                <button class="color-btn px-4 py-2 rounded-lg border-2 border-amber-600 bg-amber-50 text-amber-700 transition-colors">Nâu gỗ</button>
                <button class="color-btn px-4 py-2 rounded-lg border-2 border-gray-200 hover:border-gray-300 transition-colors">Trắng</button>
                <button class="color-btn px-4 py-2 rounded-lg border-2 border-gray-200 hover:border-gray-300 transition-colors">Xám</button>
                <button class="color-btn px-4 py-2 rounded-lg border-2 border-gray-200 hover:border-gray-300 transition-colors">Đen</button>
              </div>
            </div>

            <div>
              <h3 class="font-semibold text-gray-900 mb-3">Số lượng</h3>
              <div class="flex items-center gap-3">
                <div class="flex items-center border-2 border-gray-200 rounded-lg">
                  <button id="decreaseQtyBtn" class="px-4 py-2 hover:bg-gray-100 transition-colors">-</button>
                  <span id="quantityDisplay" class="px-6 py-2 font-semibold">1</span>
                  <button id="increaseQtyBtn" class="px-4 py-2 hover:bg-gray-100 transition-colors">+</button>
                </div>
                <span id="stockStatus" class="text-sm text-gray-500"></span>
              </div>
            </div>

            <div class="pt-4 space-y-3">
              <button id="addToCartBtn" class="w-full py-4 rounded-lg font-semibold flex items-center justify-center gap-2 transition-colors bg-white border-2 border-amber-600 text-amber-600 hover:bg-amber-50">
                <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                Thêm vào giỏ hàng
              </button>
              <button id="buyNowBtn" class="w-full py-4 rounded-lg font-semibold transition-colors bg-amber-600 hover:bg-amber-700 text-white">
                Mua ngay
              </button>
            </div>

            <div class="grid grid-cols-2 gap-4 pt-6 border-t">
              <div class="flex gap-3">
                <div class="w-12 h-12 bg-amber-100 rounded-lg flex items-center justify-center flex-shrink-0">
                  <i data-lucide="truck" class="w-6 h-6 text-amber-600"></i>
                </div>
                <div>
                  <p class="font-semibold text-gray-900 text-sm">Giao hàng miễn phí</p>
                  <p class="text-xs text-gray-600">Cho đơn hàng trên 5 triệu</p>
                </div>
              </div>
              <div class="flex gap-3">
                <div class="w-12 h-12 bg-amber-100 rounded-lg flex items-center justify-center flex-shrink-0">
                  <i data-lucide="shield" class="w-6 h-6 text-amber-600"></i>
                </div>
                <div>
                  <p class="font-semibold text-gray-900 text-sm">Bảo hành 2 năm</p>
                  <p class="text-xs text-gray-600">Bảo hành chính hãng</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-sm mt-8 p-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-6">Đánh Giá Sản Phẩm</h2>

        <div class="bg-gray-50 rounded-xl p-6 mb-8">
          <h3 class="font-semibold text-gray-900 mb-4">Viết đánh giá của bạn</h3>
          <form id="reviewForm" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Đánh giá của bạn</label>
              <div class="flex items-center gap-1" id="ratingInputContainer">
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Nhận xét</label>
              <textarea id="reviewComment" required rows="3" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 focus:border-transparent outline-none resize-none" placeholder="Chia sẻ cảm nhận của bạn về sản phẩm..."></textarea>
            </div>
            <button type="submit" class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-3 rounded-lg font-semibold transition-colors">
              Gửi đánh giá
            </button>
          </form>
        </div>

        <div id="reviewsList" class="space-y-6">
        </div>
      </div>

    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/pages/product-detail.js"></script>
</body>
</html>
