<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Sản Phẩm | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">

  <div id="admin-sidebar-container"></div>

  <div class="ml-64 min-h-screen flex flex-col">
    
    <header class="bg-white shadow-sm h-16 flex items-center justify-between px-8 border-b border-gray-200 sticky top-0 z-30">
      <div>
        <h1 class="text-xl font-bold text-gray-900">Quản Lý Sản Phẩm</h1>
      </div>
      <div class="flex items-center gap-6">
        <p class="text-gray-600 text-sm">Tổng số: <span id="totalProducts" class="font-bold text-amber-600 text-base">0</span></p>
        <button onclick="openForm()" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg font-semibold flex items-center gap-2 transition-colors text-sm shadow-sm">
          <i data-lucide="plus" class="w-4 h-4"></i> Thêm sản phẩm
        </button>
      </div>
    </header>

    <main class="p-8 flex-1">
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-gray-50 border-b border-gray-100">
              <tr>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-900">Sản phẩm</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-900">Danh mục</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-900">Giá bán</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-900">Tồn kho</th>
                <th class="px-6 py-4 text-right text-sm font-semibold text-gray-900">Thao tác</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100" id="adminProductsTable"></tbody>
          </table>
        </div>
        <div id="noProductsMsg" class="hidden text-center py-12">
          <p class="text-gray-500">Chưa có sản phẩm nào</p>
        </div>
      </div>
    </main>
  </div>

  <div id="productFormModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
      <div class="sticky top-0 bg-white border-b px-6 py-4 flex items-center justify-between z-10">
        <h2 id="modalTitle" class="text-2xl font-bold text-gray-900">Thêm Sản Phẩm Mới</h2>
        <button onclick="closeForm()" class="p-2 text-gray-400 hover:text-gray-600 transition-colors">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
      </div>

      <form id="productForm" class="p-6 space-y-4">
        <input type="hidden" id="editProductId">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Tên sản phẩm *</label>
          <input type="text" id="pName" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 outline-none">
        </div>

        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Giá bán (₫) *</label>
            <input type="number" id="pPrice" required min="0"
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Giá gốc (₫)</label>
            <input type="number" id="pOriginalPrice" min="0"
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 outline-none">
          </div>
        </div>

        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Danh mục *</label>
            <select id="pCategory" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 outline-none">
              <option value="">-- Chọn danh mục --</option>
              <option value="1">Phòng khách</option>
              <option value="2">Phòng ngủ</option>
              <option value="3">Phòng ăn</option>
              <option value="4">Phòng làm việc</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Tồn kho *</label>
            <input type="number" id="pStock" required min="0"
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 outline-none">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Hình ảnh *</label>
          <div id="uploadArea"
               class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer hover:border-amber-600 transition-colors"
               onclick="document.getElementById('fileInput').click()">
            <i data-lucide="upload-cloud" class="w-10 h-10 text-gray-400 mx-auto mb-2"></i>
            <p class="text-sm text-gray-500">Nhấn để chọn ảnh từ máy</p>
            <p class="text-xs text-gray-400 mt-1">JPG, PNG, WEBP — tối đa 5MB</p>
          </div>
          <input type="file" id="fileInput" accept="image/*" class="hidden">
          <div id="imagePreviewContainer" class="hidden mt-3 rounded-lg overflow-hidden border relative">
            <img id="imagePreview" class="w-full h-48 object-cover">
            <button type="button" onclick="removeImage()"
                    class="absolute top-2 right-2 w-7 h-7 bg-red-500 text-white rounded-full flex items-center justify-center hover:bg-red-600 shadow-sm">
              <i data-lucide="x" class="w-4 h-4"></i>
            </button>
          </div>
          <p id="uploadStatus" class="text-xs mt-2 hidden"></p>
          <input type="hidden" id="pImage">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Mô tả</label>
          <textarea id="pDesc" rows="3"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 outline-none resize-none"
                    placeholder="Mô tả chi tiết sản phẩm..."></textarea>
        </div>

        <div class="flex gap-3 pt-4 border-t border-gray-100 mt-6">
          <button type="button" onclick="closeForm()"
                  class="flex-1 border border-gray-300 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-50 transition-colors">
            Hủy
          </button>
          <button type="submit" id="submitBtn"
                  class="flex-1 bg-amber-600 hover:bg-amber-700 text-white py-3 rounded-lg font-semibold flex items-center justify-center gap-2 transition-colors shadow-sm">
            <i data-lucide="save" class="w-5 h-5"></i> Thêm mới
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/pages/admin.js"></script>
</body>
</html>
