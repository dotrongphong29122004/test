<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Trị Viên | NoiThat.vn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
  <div id="header-placeholder"></div>

  <div class="min-h-screen bg-gray-50 py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <button onclick="window.history.back()" class="flex items-center gap-2 text-gray-600 hover:text-gray-900 mb-6 transition-colors">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
        Quay lại
      </button>

      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-3xl font-bold text-gray-900">Quản Lý Sản Phẩm</h1>
          <p class="text-gray-600 mt-1">Tổng số: <span id="totalProducts">0</span> sản phẩm</p>
        </div>
        <div class="flex gap-3">
          <button onclick="window.location.href='admin-orders.html'" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold flex items-center gap-2 transition-colors">
            <i data-lucide="package" class="w-5 h-5"></i>
            Xem đơn hàng
          </button>
          <button onclick="openForm()" class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-3 rounded-lg font-semibold flex items-center gap-2 transition-colors">
            <i data-lucide="plus" class="w-5 h-5"></i>
            Thêm sản phẩm
          </button>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-gray-50 border-b">
              <tr>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-900">Sản phẩm</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-900">Danh mục</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-900">Giá bán</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-900">Tồn kho</th>
                <th class="px-6 py-4 text-right text-sm font-semibold text-gray-900">Thao tác</th>
              </tr>
            </thead>
            <tbody class="divide-y" id="adminProductsTable"></tbody>
          </table>
        </div>
        <div id="noProductsMsg" class="hidden text-center py-12">
          <p class="text-gray-500">Chưa có sản phẩm nào</p>
        </div>
      </div>
    </div>
  </div>

  <div id="productFormModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
      <div class="sticky top-0 bg-white border-b px-6 py-4 flex items-center justify-between z-10">
        <h2 id="modalTitle" class="text-2xl font-bold text-gray-900">Thêm Sản Phẩm Mới</h2>
        <button onclick="closeForm()" class="p-2 text-gray-400 hover:text-gray-600 transition-colors">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
      </div>

      <form id="productForm" class="p-6 space-y-4">
        <input type="hidden" id="editProductId">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Tên sản phẩm *</label>
          <input type="text" id="pName" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 focus:border-transparent outline-none">
        </div>

        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Giá bán *</label>
            <input type="number" id="pPrice" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 focus:border-transparent outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Giá gốc (tùy chọn)</label>
            <input type="number" id="pOriginalPrice" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 focus:border-transparent outline-none">
          </div>
        </div>

        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Danh mục *</label>
            <select id="pCategory" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 focus:border-transparent outline-none">
              <option value="Phòng khách">Phòng khách</option>
              <option value="Phòng ngủ">Phòng ngủ</option>
              <option value="Phòng ăn">Phòng ăn</option>
              <option value="Phòng làm việc">Phòng làm việc</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Số lượng tồn kho *</label>
            <input type="number" id="pStock" required min="0" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 focus:border-transparent outline-none">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">URL hình ảnh *</label>
          <input type="url" id="pImage" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 focus:border-transparent outline-none">
          <div id="imagePreviewContainer" class="hidden mt-3 rounded-lg overflow-hidden border">
            <img id="imagePreview" class="w-full h-48 object-cover">
          </div>
        </div>

        <div class="flex gap-3 pt-4">
          <button type="button" onclick="closeForm()" class="flex-1 border-2 border-gray-300 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-50 transition-colors">Hủy</button>
          <button type="submit" id="submitBtn" class="flex-1 bg-amber-600 hover:bg-amber-700 text-white py-3 rounded-lg font-semibold flex items-center justify-center gap-2 transition-colors">
            <i data-lucide="save" class="w-5 h-5"></i>
            Thêm mới
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/data.js"></script>
  <script>
    let adminProducts = getProducts();

    function renderAdminProducts() {
      const tbody = document.getElementById('adminProductsTable');
      document.getElementById('totalProducts').textContent = adminProducts.length;
      tbody.innerHTML = '';
      
      if (adminProducts.length === 0) {
        document.getElementById('noProductsMsg').classList.remove('hidden');
      } else {
        document.getElementById('noProductsMsg').classList.add('hidden');
        adminProducts.forEach(product => {
          let stockClass = 'text-green-600';
          let stockText = product.stock;
          if (product.stock <= 0) { stockClass = 'text-red-600'; stockText = '0 (Hết hàng)'; }
          else if (product.stock < 10) { stockClass = 'text-orange-600'; }

          tbody.innerHTML += `
            <tr class="hover:bg-gray-50 transition-colors">
              <td class="px-6 py-4">
                <div class="flex items-center gap-3">
                  <div class="w-16 h-16 rounded-lg overflow-hidden bg-gray-100 flex-shrink-0">
                    <img src="${product.image}" class="w-full h-full object-cover">
                  </div>
                  <div><p class="font-medium text-gray-900">${product.name}</p></div>
                </div>
              </td>
              <td class="px-6 py-4 text-gray-600">${product.category}</td>
              <td class="px-6 py-4"><span class="font-semibold text-amber-600">${product.price.toLocaleString('vi-VN')}₫</span></td>
              <td class="px-6 py-4"><span class="font-semibold ${stockClass}">${stockText}</span></td>
              <td class="px-6 py-4">
                <div class="flex items-center justify-end gap-2">
                  <button onclick="editProduct(${product.id})" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                  <button onclick="deleteProduct(${product.id})" class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
              </td>
            </tr>
          `;
        });
      }
      lucide.createIcons();
    }

    const modal = document.getElementById('productFormModal');
    const form = document.getElementById('productForm');
    const pImageInput = document.getElementById('pImage');
    const imagePreviewContainer = document.getElementById('imagePreviewContainer');
    const imagePreview = document.getElementById('imagePreview');

    pImageInput.addEventListener('input', (e) => {
      if (e.target.value) {
        imagePreview.src = e.target.value;
        imagePreviewContainer.classList.remove('hidden');
      } else {
        imagePreviewContainer.classList.add('hidden');
      }
    });

    window.openForm = function() {
      form.reset();
      document.getElementById('editProductId').value = '';
      document.getElementById('modalTitle').textContent = 'Thêm Sản Phẩm Mới';
      document.getElementById('submitBtn').innerHTML = '<i data-lucide="save" class="w-5 h-5"></i> Thêm mới';
      imagePreviewContainer.classList.add('hidden');
      modal.classList.remove('hidden');
      lucide.createIcons();
    }

    window.closeForm = function() {
      modal.classList.add('hidden');
    }

    window.editProduct = function(id) {
      const product = adminProducts.find(p => p.id === id);
      if (product) {
        document.getElementById('editProductId').value = product.id;
        document.getElementById('pName').value = product.name;
        document.getElementById('pPrice').value = product.price;
        document.getElementById('pOriginalPrice').value = product.originalPrice || '';
        document.getElementById('pCategory').value = product.category;
        document.getElementById('pStock').value = product.stock;
        document.getElementById('pImage').value = product.image;
        
        imagePreview.src = product.image;
        imagePreviewContainer.classList.remove('hidden');

        document.getElementById('modalTitle').textContent = 'Chỉnh Sửa Sản Phẩm';
        document.getElementById('submitBtn').innerHTML = '<i data-lucide="save" class="w-5 h-5"></i> Cập nhật';
        modal.classList.remove('hidden');
        lucide.createIcons();
      }
    }

    window.deleteProduct = function(id) {
      if (confirm('Bạn có chắc muốn xóa sản phẩm này?')) {
        adminProducts = adminProducts.filter(p => p.id !== id);
        saveProducts(adminProducts);
        renderAdminProducts();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const editId = document.getElementById('editProductId').value;
      const newProduct = {
        name: document.getElementById('pName').value,
        price: parseFloat(document.getElementById('pPrice').value),
        originalPrice: document.getElementById('pOriginalPrice').value ? parseFloat(document.getElementById('pOriginalPrice').value) : null,
        category: document.getElementById('pCategory').value,
        stock: parseInt(document.getElementById('pStock').value),
        image: document.getElementById('pImage').value
      };

      if (editId) {
        newProduct.id = parseInt(editId);
        const index = adminProducts.findIndex(p => p.id === newProduct.id);
        adminProducts[index] = { ...adminProducts[index], ...newProduct };
      } else {
        newProduct.id = Date.now();
        adminProducts.push(newProduct);
      }

      saveProducts(adminProducts);
      closeForm();
      renderAdminProducts();
    });

    renderAdminProducts();
  </script>
</body>
</html>
