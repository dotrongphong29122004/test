<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Tài Khoản | NoiThat.vn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
  <div id="header-placeholder"></div>

  <div class="min-h-screen bg-gray-50 py-8">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
      <button onclick="window.history.back()" class="flex items-center gap-2 text-gray-600 hover:text-gray-900 mb-6 transition-colors">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
        Quay lại
      </button>

      <h1 class="text-3xl font-bold text-gray-900 mb-8">Quản Lý Tài Khoản</h1>

      <div class="grid md:grid-cols-2 gap-8">
        <div class="bg-white rounded-2xl shadow-sm p-8">
          <h2 class="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
            <i data-lucide="user" class="w-6 h-6 text-amber-600"></i>
            Thông Tin Cá Nhân
          </h2>
          
          <div class="flex flex-col items-center mb-8">
            <div class="relative">
              <div id="avatarLetter" class="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center text-3xl font-bold text-gray-500">
                U
              </div>
              <button class="absolute bottom-0 right-0 w-8 h-8 bg-amber-600 rounded-full text-white flex items-center justify-center border-2 border-white hover:bg-amber-700 transition-colors">
                <i data-lucide="camera" class="w-4 h-4"></i>
              </button>
            </div>
            <p class="text-sm text-gray-500 mt-3">Nhấn để thay đổi ảnh đại diện</p>
          </div>

          <form id="profileForm" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Họ và tên</label>
              <input type="text" id="profileName" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 focus:border-transparent outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
              <input type="email" id="profileEmail" disabled class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-50 text-gray-500 outline-none">
            </div>

            <div id="adminBadgeBox" class="hidden bg-amber-50 border border-amber-200 rounded-lg p-4 mt-4">
              <p class="font-semibold text-amber-800">Tài khoản Admin</p>
              <p class="text-sm text-amber-700">Bạn có quyền quản lý sản phẩm và đơn hàng.</p>
            </div>

            <button type="submit" class="w-full mt-6 bg-amber-600 hover:bg-amber-700 text-white py-3 rounded-lg font-semibold flex items-center justify-center gap-2 transition-colors">
              <i data-lucide="save" class="w-5 h-5"></i>
              Lưu thay đổi
            </button>
          </form>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-8">
          <h2 class="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
            <i data-lucide="lock" class="w-6 h-6 text-amber-600"></i>
            Đổi Mật Khẩu
          </h2>
          <form id="passwordForm" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Mật khẩu hiện tại</label>
              <input type="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 focus:border-transparent outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Mật khẩu mới</label>
              <input type="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 focus:border-transparent outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Xác nhận mật khẩu mới</label>
              <input type="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 focus:border-transparent outline-none">
            </div>
            <button type="submit" class="w-full mt-6 bg-amber-600 hover:bg-amber-700 text-white py-3 rounded-lg font-semibold transition-colors">
              Đổi mật khẩu
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const userStr = localStorage.getItem('currentUser');
      
      if (!userStr) {
        window.location.href = 'index.html';
        return;
      }

      const user = JSON.parse(userStr);

      document.getElementById('profileName').value = user.name || '';
      document.getElementById('profileEmail').value = user.email || '';
      
      if (user.name) {
        document.getElementById('avatarLetter').textContent = user.name.charAt(0).toUpperCase();
      }

      if (user.isAdmin) {
        document.getElementById('adminBadgeBox').classList.remove('hidden');
      }

      document.getElementById('passwordForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        // Lấy các ô nhập liệu trong form
        const inputs = e.target.querySelectorAll('input[type="password"]');
        const currentPwd = inputs[0].value;
        const newPwd = inputs[1].value;
        const confirmPwd = inputs[2].value;

        // Lấy danh sách tài khoản từ hệ thống
        let usersList = JSON.parse(localStorage.getItem('usersList')) || [];
        const userIndex = usersList.findIndex(u => u.email === user.email);

        if (userIndex === -1) {
          alert('Lỗi: Không tìm thấy tài khoản trong hệ thống!');
          return;
        }

        // Kiểm tra mật khẩu cũ
        if (usersList[userIndex].password !== currentPwd) {
          alert('Mật khẩu hiện tại không đúng!');
          return;
        }

        // Kiểm tra độ dài mật khẩu mới
        if (newPwd.length < 6) {
          alert('Mật khẩu mới phải có ít nhất 6 ký tự!');
          return;
        }

        // Kiểm tra khớp mật khẩu xác nhận
        if (newPwd !== confirmPwd) {
          alert('Mật khẩu xác nhận không khớp!');
          return;
        }

        // Cập nhật mật khẩu mới và lưu lại
        usersList[userIndex].password = newPwd;
        localStorage.setItem('usersList', JSON.stringify(usersList));
        
        alert('Đổi mật khẩu thành công! Vui lòng sử dụng mật khẩu mới cho lần đăng nhập sau.');
        e.target.reset();
      });

      document.getElementById('passwordForm').addEventListener('submit', (e) => {
        e.preventDefault();
        alert('Đổi mật khẩu thành công!');
        e.target.reset();
      });

      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }
    });
  </script>
</body>
</html>
