<header class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <div class="flex items-center cursor-pointer" onclick="window.location.href='index.html'">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-amber-600 rounded-lg flex items-center justify-center">
            <span class="text-white font-bold text-xl">N</span>
          </div>
          <span class="text-xl font-bold text-gray-900">NoiThat.vn</span>
        </div>
      </div>

      <nav class="hidden md:flex items-center gap-8">
        <a href="index.html" class="text-gray-700 hover:text-amber-600 transition-colors">Trang chủ</a>
        <a href="products.html" class="text-gray-700 hover:text-amber-600 transition-colors">Sản phẩm</a>
        <a href="#" class="text-gray-700 hover:text-amber-600 transition-colors">Về chúng tôi</a>
        <a href="#" class="text-gray-700 hover:text-amber-600 transition-colors">Liên hệ</a>
      </nav>

      <div class="flex items-center gap-4">
        <button class="p-2 text-gray-700 hover:text-amber-600 transition-colors">
          <i data-lucide="search" class="w-5 h-5"></i>
        </button>
        
        <button id="cartBtn" class="relative p-2 text-gray-700 hover:text-amber-600 transition-colors" onclick="window.location.href='cart.html'">
          <i data-lucide="shopping-cart" class="w-5 h-5"></i>
          <span id="cartCount" class="absolute -top-1 -right-1 bg-amber-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">3</span>
        </button>
        
        <div class="relative" id="userMenuContainer">
          <button id="userMenuBtn" class="flex items-center gap-2 p-2 rounded-lg hover:bg-gray-100 transition-colors">
            <div class="w-8 h-8 bg-amber-600 rounded-full flex items-center justify-center">
              <i data-lucide="user" class="w-5 h-5 text-white"></i>
            </div>
            <span class="hidden md:block font-medium text-gray-900">Người dùng</span>
          </button>

          <div id="userMenuDropdown" class="hidden absolute right-0 mt-2 w-64 bg-white rounded-lg shadow-lg border border-gray-200 py-2 z-20">
            <div class="px-4 py-3 border-b border-gray-100">
              <p class="font-semibold text-gray-900">Người dùng</p>
              <p class="text-sm text-gray-500">user@example.com</p>
            </div>
            
            <button onclick="window.location.href='account.html'" class="w-full px-4 py-2 text-left flex items-center gap-3 hover:bg-gray-50 transition-colors">
              <i data-lucide="settings" class="w-4 h-4 text-gray-500"></i>
              <span class="text-gray-700">Quản lý tài khoản</span>
            </button>

            <button onclick="window.location.href='orders.html'" class="w-full px-4 py-2 text-left flex items-center gap-3 hover:bg-gray-50 transition-colors">
              <i data-lucide="package" class="w-4 h-4 text-gray-500"></i>
              <span class="text-gray-700">Đơn hàng của tôi</span>
            </button>

            <div class="border-t border-gray-100 mt-2 pt-2">
              <button onclick="handleLogout()" class="w-full px-4 py-2 text-left flex items-center gap-3 hover:bg-gray-50 transition-colors text-red-600">
                <i data-lucide="log-out" class="w-4 h-4"></i>
                <span>Đăng xuất</span>
              </button>
            </div>
          </div>
        </div>
        
        <button class="md:hidden p-2 text-gray-700 hover:text-amber-600 transition-colors">
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </div>
</header>
