<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đơn Hàng Của Tôi | NoiThat.vn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
  <div id="header-placeholder"></div>

  <div class="min-h-screen bg-gray-50 py-8">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
      <button onclick="window.history.back()" class="flex items-center gap-2 text-gray-600 hover:text-gray-900 mb-6 transition-colors">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
        Quay lại
      </button>

      <h1 class="text-3xl font-bold text-gray-900 mb-8">Đơn Hàng Của Tôi</h1>

      <div id="emptyOrdersMessage" class="hidden bg-white rounded-2xl shadow-sm p-12 text-center">
        <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <i data-lucide="package" class="w-12 h-12 text-gray-400"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Chưa có đơn hàng nào</h2>
        <p class="text-gray-600 mb-6">Bạn chưa thực hiện giao dịch nào trên hệ thống.</p>
        <button onclick="window.location.href='products.html'" class="bg-amber-600 hover:bg-amber-700 text-white px-8 py-3 rounded-lg font-semibold transition-colors">
          Mua sắm ngay
        </button>
      </div>

      <div id="myOrdersList" class="space-y-6"></div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
    // 1. Kiểm tra đăng nhập
    if (!isLoggedIn()) {
      window.location.href = 'index.html';
      return;
    }

    const user = JSON.parse(localStorage.getItem('currentUser'));

    // 2. Lấy dữ liệu đơn hàng từ bộ nhớ (Nếu trống thì là mảng rỗng [])
    let allOrders = JSON.parse(localStorage.getItem('ordersData')) || [];

    // 3. Lọc đơn hàng theo Email của tài khoản đang đăng nhập
    const myOrders = allOrders.filter(order => order.userEmail === user.email);
    myOrders.reverse(); // Đảo ngược để đơn hàng mới nhất lên đầu

    const ordersListContainer = document.getElementById('myOrdersList');
    const emptyMessage = document.getElementById('emptyOrdersMessage');

    if (myOrders.length === 0) {
      ordersListContainer.classList.add('hidden');
      emptyMessage.classList.remove('hidden');
      return;
    }

    ordersListContainer.classList.remove('hidden');
    emptyMessage.classList.add('hidden');

    // 4. Render giao diện
    let html = '';
    myOrders.forEach(order => {
      let statusClass = '';
      let statusText = '';
      let statusIcon = '';

      switch (order.status) {
        case 'pending': 
          statusClass = 'text-yellow-700 border-yellow-200 bg-yellow-50'; 
          statusText = 'Chờ xác nhận'; 
          statusIcon = 'clock';
          break;
        case 'processing': 
          statusClass = 'text-blue-700 border-blue-200 bg-blue-50'; 
          statusText = 'Đang xử lý'; 
          statusIcon = 'loader';
          break;
        case 'completed': 
          statusClass = 'text-green-700 border-green-200 bg-green-50'; 
          statusText = 'Hoàn thành'; 
          statusIcon = 'check-circle';
          break;
        case 'cancelled': 
          statusClass = 'text-red-700 border-red-200 bg-red-50'; 
          statusText = 'Đã hủy'; 
          statusIcon = 'x-circle';
          break;
      }

      let itemsHtml = '';
      order.items.forEach(item => {
        itemsHtml += `
          <div class="flex items-center gap-4 py-4 border-b border-gray-100 last:border-0 last:pb-0">
            <div class="w-20 h-20 rounded-lg overflow-hidden bg-gray-100 flex-shrink-0">
              <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
              <h4 class="font-semibold text-gray-900">${item.name}</h4>
              <div class="flex items-center gap-4 mt-1 text-sm">
                <span class="text-gray-500">Số lượng: <span class="font-medium text-gray-900">${item.quantity}</span></span>
                <span class="font-semibold text-amber-600">${item.price.toLocaleString('vi-VN')}₫</span>
              </div>
            </div>
            <div class="text-right hidden sm:block">
              <span class="font-bold text-gray-900">${(item.price * item.quantity).toLocaleString('vi-VN')}₫</span>
            </div>
          </div>
        `;
      });

      html += `
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
          <div class="border-b border-gray-100 px-6 py-4 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-6 text-sm">
              <div>
                <p class="text-gray-500 mb-1">Mã đơn hàng</p>
                <p class="font-bold text-gray-900">${order.id}</p>
              </div>
              <div>
                <p class="text-gray-500 mb-1">Ngày đặt</p>
                <p class="font-semibold text-gray-900">${order.date}</p>
              </div>
              <div>
                <p class="text-gray-500 mb-1">Tổng tiền</p>
                <p class="font-bold text-amber-600">${order.total.toLocaleString('vi-VN')}₫</p>
              </div>
            </div>
            
            <div class="flex items-center gap-2 px-4 py-2 rounded-full border ${statusClass} font-semibold text-sm">
              <i data-lucide="${statusIcon}" class="w-4 h-4"></i>
              ${statusText}
            </div>
          </div>
          
          <div class="p-6">
            ${itemsHtml}
            
            <div class="mt-6 p-4 bg-gray-50 rounded-xl text-sm">
              <p class="font-semibold text-gray-900 mb-2">Thông tin giao hàng</p>
              <div class="text-gray-600 space-y-1">
                <p><span class="inline-block w-24">Số điện thoại:</span> <span class="font-medium text-gray-900">${order.shippingInfo.phone}</span></p>
                <p><span class="inline-block w-24">Địa chỉ:</span> <span class="font-medium text-gray-900">${order.shippingInfo.ward}, ${order.shippingInfo.district}, ${order.shippingInfo.city}</span></p>
              </div>
            </div>
          </div>
        </div>
      `;
    });

    ordersListContainer.innerHTML = html;

    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  });
  </script>
</body>
</html>
