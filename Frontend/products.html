<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sản Phẩm | NoiThat.vn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
  <div id="header-placeholder"></div>

  <div class="min-h-screen bg-gray-50 py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Tất Cả Sản Phẩm</h1>
        <p class="text-gray-600">Khám phá bộ sưu tập đồ nội thất của chúng tôi</p>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
        <div class="flex flex-col md:flex-row gap-4">
          <div class="flex-1 relative">
            <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"></i>
            <input
              type="text"
              id="searchInput"
              placeholder="Tìm kiếm sản phẩm..."
              class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 focus:border-transparent outline-none"
            />
          </div>

          <select
            id="sortSelect"
            class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-600 focus:border-transparent outline-none"
          >
            <option value="default">Sắp xếp mặc định</option>
            <option value="price-asc">Giá: Thấp đến cao</option>
            <option value="price-desc">Giá: Cao đến thấp</option>
            <option value="name">Tên: A-Z</option>
          </select>

          <button
            id="toggleFiltersBtn"
            class="md:hidden flex items-center justify-center gap-2 px-4 py-3 border-2 border-amber-600 text-amber-600 rounded-lg font-semibold hover:bg-amber-50 transition-colors"
          >
            <i data-lucide="sliders-horizontal" class="w-5 h-5"></i>
            Bộ lọc
          </button>
        </div>
      </div>

      <div class="grid lg:grid-cols-4 gap-6">
        <div id="filtersSidebar" class="lg:col-span-1 hidden lg:block">
          <div class="bg-white rounded-xl shadow-sm p-6 sticky top-24 space-y-6">
            <div class="flex items-center gap-2 pb-4 border-b">
              <i data-lucide="filter" class="w-5 h-5 text-amber-600"></i>
              <h2 class="font-bold text-gray-900">Bộ Lọc</h2>
            </div>

            <div>
              <h3 class="font-semibold text-gray-900 mb-3">Danh Mục</h3>
              <div class="space-y-2">
                <label class="flex items-center cursor-pointer group">
                  <input type="radio" name="category" value="all" checked class="w-4 h-4 text-amber-600 focus:ring-amber-600" />
                  <span class="ml-3 text-gray-700 group-hover:text-amber-600 transition-colors">Tất cả</span>
                </label>
                <label class="flex items-center cursor-pointer group">
                  <input type="radio" name="category" value="Phòng khách" class="w-4 h-4 text-amber-600 focus:ring-amber-600" />
                  <span class="ml-3 text-gray-700 group-hover:text-amber-600 transition-colors">Phòng khách</span>
                </label>
                <label class="flex items-center cursor-pointer group">
                  <input type="radio" name="category" value="Phòng ngủ" class="w-4 h-4 text-amber-600 focus:ring-amber-600" />
                  <span class="ml-3 text-gray-700 group-hover:text-amber-600 transition-colors">Phòng ngủ</span>
                </label>
                <label class="flex items-center cursor-pointer group">
                  <input type="radio" name="category" value="Phòng ăn" class="w-4 h-4 text-amber-600 focus:ring-amber-600" />
                  <span class="ml-3 text-gray-700 group-hover:text-amber-600 transition-colors">Phòng ăn</span>
                </label>
                <label class="flex items-center cursor-pointer group">
                  <input type="radio" name="category" value="Phòng làm việc" class="w-4 h-4 text-amber-600 focus:ring-amber-600" />
                  <span class="ml-3 text-gray-700 group-hover:text-amber-600 transition-colors">Phòng làm việc</span>
                </label>
              </div>
            </div>

            <div class="pt-4 border-t">
              <h3 class="font-semibold text-gray-900 mb-3">Khoảng Giá</h3>
              <div class="space-y-2">
                <label class="flex items-center cursor-pointer group">
                  <input type="radio" name="price" value="all" checked class="w-4 h-4 text-amber-600 focus:ring-amber-600" />
                  <span class="ml-3 text-gray-700 group-hover:text-amber-600 transition-colors">Tất cả</span>
                </label>
                <label class="flex items-center cursor-pointer group">
                  <input type="radio" name="price" value="under5" class="w-4 h-4 text-amber-600 focus:ring-amber-600" />
                  <span class="ml-3 text-gray-700 group-hover:text-amber-600 transition-colors">Dưới 5 triệu</span>
                </label>
                <label class="flex items-center cursor-pointer group">
                  <input type="radio" name="price" value="5to10" class="w-4 h-4 text-amber-600 focus:ring-amber-600" />
                  <span class="ml-3 text-gray-700 group-hover:text-amber-600 transition-colors">5 - 10 triệu</span>
                </label>
                <label class="flex items-center cursor-pointer group">
                  <input type="radio" name="price" value="10to15" class="w-4 h-4 text-amber-600 focus:ring-amber-600" />
                  <span class="ml-3 text-gray-700 group-hover:text-amber-600 transition-colors">10 - 15 triệu</span>
                </label>
                <label class="flex items-center cursor-pointer group">
                  <input type="radio" name="price" value="over15" class="w-4 h-4 text-amber-600 focus:ring-amber-600" />
                  <span class="ml-3 text-gray-700 group-hover:text-amber-600 transition-colors">Trên 15 triệu</span>
                </label>
              </div>
            </div>

            <button
              id="clearFiltersBtn"
              class="w-full py-2 text-amber-600 hover:text-amber-700 font-semibold transition-colors"
            >
              Xóa bộ lọc
            </button>
          </div>
        </div>

        <div class="lg:col-span-3">
          <div class="mb-4 flex items-center justify-between">
            <p class="text-gray-600">
              Hiển thị <span id="productCount" class="font-semibold">0</span> sản phẩm
            </p>
          </div>

          <div id="productsContainer" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
          </div>
          
          <div id="noProductsMessage" class="hidden bg-white rounded-xl shadow-sm p-12 text-center">
            <p class="text-gray-500 text-lg">Không tìm thấy sản phẩm nào</p>
            <button id="clearFiltersEmptyBtn" class="mt-4 text-amber-600 hover:text-amber-700 font-semibold">
              Xóa bộ lọc
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/pages/product.js"></script>
  <script>
    if (typeof lucide !== 'undefined') {
      lucide.createIcons();
    }
  </script>
</body>
</html>
