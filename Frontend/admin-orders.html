<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Đơn Hàng | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
  <div id="header-placeholder"></div>

  <div class="min-h-screen bg-gray-50 py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <button onclick="window.history.back()" class="flex items-center gap-2 text-gray-600 hover:text-gray-900 mb-6 transition-colors">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
        Quay lại
      </button>

      <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Quản Lý Đơn Hàng</h1>
        <p class="text-gray-600">Tổng số: <span id="totalOrdersCountHeader">0</span> đơn hàng</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-xl shadow-sm p-6">
          <p class="text-sm text-gray-600 mb-1">Tổng đơn hàng</p>
          <p id="statTotal" class="text-2xl font-bold text-gray-900">0</p>
        </div>
        <div class="bg-yellow-50 rounded-xl shadow-sm p-6 border border-yellow-100">
          <p class="text-sm text-yellow-800 mb-1">Chờ xác nhận</p>
          <p id="statPending" class="text-2xl font-bold text-yellow-900">0</p>
        </div>
        <div class="bg-blue-50 rounded-xl shadow-sm p-6 border border-blue-100">
          <p class="text-sm text-blue-800 mb-1">Đang xử lý</p>
          <p id="statProcessing" class="text-2xl font-bold text-blue-900">0</p>
        </div>
        <div class="bg-green-50 rounded-xl shadow-sm p-6 border border-green-100">
          <p class="text-sm text-green-800 mb-1">Doanh thu</p>
          <p id="statRevenue" class="text-2xl font-bold text-green-900">0M</p>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
        <div class="flex flex-col md:flex-row gap-4">
          <div class="flex-1 relative">
            <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"></i>
            <input type="text" id="adminSearchInput" placeholder="Tìm kiếm theo mã đơn, tên khách hàng..." class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none">
          </div>
          <select id="adminStatusFilter" class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none">
            <option value="all">Tất cả trạng thái</option>
            <option value="pending">Chờ xác nhận</option>
            <option value="processing">Đang xử lý</option>
            <option value="completed">Hoàn thành</option>
            <option value="cancelled">Đã hủy</option>
          </select>
        </div>
      </div>

      <div id="adminEmptyOrders" class="hidden bg-white rounded-2xl shadow-sm p-12 text-center">
        <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <i data-lucide="package" class="w-12 h-12 text-gray-400"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Không tìm thấy đơn hàng</h2>
        <p class="text-gray-600">Thử thay đổi bộ lọc hoặc tìm kiếm</p>
      </div>

      <div id="adminOrdersList" class="space-y-4"></div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    // Lấy dữ liệu từ LocalStorage thay vì code cứng
    let allOrders = JSON.parse(localStorage.getItem('ordersData')) || [];

    const adminSearchInput = document.getElementById('adminSearchInput');
    const adminStatusFilter = document.getElementById('adminStatusFilter');
    const adminOrdersList = document.getElementById('adminOrdersList');
    const adminEmptyOrders = document.getElementById('adminEmptyOrders');
    const totalOrdersCountHeader = document.getElementById('totalOrdersCountHeader');

    function getStatusColor(status) {
      switch (status) {
        case 'pending': return 'text-yellow-600 bg-yellow-50 border-yellow-200';
        case 'processing': return 'text-blue-600 bg-blue-50 border-blue-200';
        case 'completed': return 'text-green-600 bg-green-50 border-green-200';
        case 'cancelled': return 'text-red-600 bg-red-50 border-red-200';
      }
    }

    function updateStats() {
      document.getElementById('statTotal').textContent = allOrders.length;
      document.getElementById('statPending').textContent = allOrders.filter(o => o.status === 'pending').length;
      document.getElementById('statProcessing').textContent = allOrders.filter(o => o.status === 'processing').length;
      
      const revenue = allOrders.filter(o => o.status === 'completed').reduce((sum, o) => sum + o.total, 0);
      document.getElementById('statRevenue').textContent = (revenue / 1000000).toFixed(1) + 'M';
    }

    function renderAdminOrders() {
      const searchTerm = adminSearchInput.value.toLowerCase();
      const statusFilter = adminStatusFilter.value;

      const filteredOrders = allOrders.filter(order => {
        const matchesSearch = order.id.toLowerCase().includes(searchTerm) || 
                              order.userName.toLowerCase().includes(searchTerm) || 
                              order.userEmail.toLowerCase().includes(searchTerm);
        const matchesStatus = statusFilter === 'all' || order.status === statusFilter;
        return matchesSearch && matchesStatus;
      });

      // Đảo ngược mảng để đơn mới nhất lên đầu
      const displayOrders = [...filteredOrders].reverse();

      totalOrdersCountHeader.textContent = allOrders.length;
      adminOrdersList.innerHTML = '';

      if (displayOrders.length === 0) {
        adminOrdersList.classList.add('hidden');
        adminEmptyOrders.classList.remove('hidden');
        return;
      }

      adminOrdersList.classList.remove('hidden');
      adminEmptyOrders.classList.add('hidden');

      displayOrders.forEach(order => {
        const colorClass = getStatusColor(order.status);
        let itemsHtml = '';

        order.items.forEach(item => {
          itemsHtml += `
            <div class="flex gap-4 pb-3 border-b border-gray-100 last:border-0">
              <div class="w-16 h-16 flex-shrink-0 rounded-lg overflow-hidden bg-gray-100">
                <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">
              </div>
              <div class="flex-1">
                <h3 class="font-semibold text-gray-900 text-sm mb-1">${item.name}</h3>
                <div class="flex items-center gap-4 text-sm text-gray-600">
                  <span>SL: ${item.quantity}</span>
                  <span class="font-semibold text-amber-600">${item.price.toLocaleString('vi-VN')}₫</span>
                </div>
              </div>
              <div class="text-right">
                <p class="font-semibold text-gray-900">${(item.price * item.quantity).toLocaleString('vi-VN')}₫</p>
              </div>
            </div>
          `;
        });

        const orderDiv = document.createElement('div');
        orderDiv.className = 'bg-white rounded-xl shadow-sm overflow-hidden';
        orderDiv.innerHTML = `
          <div class="bg-gray-50 px-6 py-4 border-b border-gray-100">
            <div class="flex flex-wrap items-center justify-between gap-4">
              <div class="flex flex-wrap items-center gap-6">
                <div>
                  <p class="text-xs text-gray-500">Mã đơn hàng</p>
                  <p class="font-semibold text-gray-900">${order.id}</p>
                </div>
                <div>
                  <p class="text-xs text-gray-500">Khách hàng</p>
                  <p class="font-semibold text-gray-900">${order.userName}</p>
                  <p class="text-xs text-gray-500">${order.userEmail}</p>
                </div>
                <div>
                  <p class="text-xs text-gray-500">Ngày đặt</p>
                  <p class="font-semibold text-gray-900">${order.date}</p>
                </div>
                <div>
                  <p class="text-xs text-gray-500">Tổng tiền</p>
                  <p class="font-semibold text-amber-600">${order.total.toLocaleString('vi-VN')}₫</p>
                </div>
              </div>
              <div class="flex items-center gap-3">
                <select onchange="updateOrderStatus('${order.id}', this.value)" class="px-4 py-2 rounded-lg border font-semibold text-sm outline-none ${colorClass}">
                  <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Chờ xác nhận</option>
                  <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>Đang xử lý</option>
                  <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>Hoàn thành</option>
                  <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Đã hủy</option>
                </select>
              </div>
            </div>
          </div>
          <div class="p-6">
            <div class="grid lg:grid-cols-3 gap-6">
              <div class="lg:col-span-2">
                <h4 class="font-semibold text-gray-900 text-sm mb-4">Sản phẩm</h4>
                <div class="space-y-3">${itemsHtml}</div>
              </div>
              <div>
                <h4 class="font-semibold text-gray-900 text-sm mb-4">Thông tin giao hàng</h4>
                <div class="bg-gray-50 rounded-lg p-4 space-y-2 text-sm">
                  <div>
                    <span class="text-gray-500">SĐT:</span>
                    <span class="ml-2 font-medium text-gray-900">${order.shippingInfo.phone}</span>
                  </div>
                  <div>
                    <span class="text-gray-500">Địa chỉ:</span>
                    <p class="font-medium text-gray-900 mt-1">${order.shippingInfo.ward}, ${order.shippingInfo.district}, ${order.shippingInfo.city}</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
        adminOrdersList.appendChild(orderDiv);
      });

      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    window.updateOrderStatus = function(id, newStatus) {
      const order = allOrders.find(o => o.id === id);
      if (order) {
        order.status = newStatus;
        // Lưu lại vào LocalStorage khi admin đổi trạng thái
        localStorage.setItem('ordersData', JSON.stringify(allOrders));
        updateStats();
        renderAdminOrders();
      }
    };

    adminSearchInput.addEventListener('input', renderAdminOrders);
    adminStatusFilter.addEventListener('change', renderAdminOrders);

    updateStats();
    renderAdminOrders();

  </script>
</body>
</html>
